name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: python -m pip install --upgrade pip ".[dev]"
      - name: ruff check
        run: python -m ruff check .
      - name: ruff format --check
        run: python -m ruff format --check .
      - name: mypy
        run: python -m mypy

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # origin-mcp's primary tested target runs on Windows; the test suite
        # mocks originpro, so no Origin install is required here. The version
        # spread validates the support range advertised in pyproject.toml.
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev dependencies
        run: python -m pip install --upgrade pip ".[dev]"
      - name: Run tests
        run: >-
          python -m pytest -q --cov=origin_mcp --cov-report=term-missing
          --cov-report=xml --cov-fail-under=80
